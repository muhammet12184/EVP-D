version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: super-mobility-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
    volumes:
      - mongodb_data:/data/db
    networks:
      - super-mobility-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: super-mobility-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - super-mobility-network

  # Go Backend API
  backend-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: super-mobility-backend
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: mongodb://admin:changeme@mongodb:27017/supermobility?authSource=admin
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1
      AWS_IOT_ENDPOINT: ${AWS_IOT_ENDPOINT}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - mongodb
      - redis
    networks:
      - super-mobility-network
    volumes:
      - ../backend:/app
    command: go run cmd/api/main.go

  # Python AI Services
  ai-services:
    build:
      context: ../ai-services
      dockerfile: Dockerfile
    container_name: super-mobility-ai
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: mongodb://admin:changeme@mongodb:27017/supermobility?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - super-mobility-network
    volumes:
      - ../ai-services:/app
      - ai_models:/app/models
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
  redis_data:
  ai_models:

networks:
  super-mobility-network:
    driver: bridge
