name: super_mobility_app
description: Yeni Nesil Mobilite ve Yaşam Ekosistemi - Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # UI & Animations
  flutter_animate: ^4.2.0+1
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  
  # Maps & Location
  mapbox_maps_flutter: ^1.0.0
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  
  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # AWS IoT
  aws_iot_device_defender: ^1.0.0
  mqtt_client: ^10.0.0
  
  # OBD-II & Vehicle Communication
  flutter_blue_plus: ^1.30.0
  obd2_plugin: ^1.0.0
  
  # AI & ML
  google_mlkit_face_detection: ^0.9.0
  google_mlkit_speech_recognition: ^0.9.0
  speech_to_text: ^6.3.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Payments & Wallet
  flutter_stripe: ^10.1.1
  
  # Blockchain (Battery Passport)
  web3dart: ^2.7.3
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  
  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.11
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  syncfusion_flutter_charts: ^24.1.41
  
  # 3D Visualization
  flutter_gl: ^0.0.1
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Image Processing
  image_picker: ^1.0.5
  
  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - .env
