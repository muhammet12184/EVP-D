name: super_app
description: Yeni Nesil Mobilite ve Yaşam Ekosistemi - Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Maps & Location
  mapbox_maps_flutter: ^1.0.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # AI & Voice
  speech_to_text: ^6.6.0
  text_to_speech: ^4.0.0
  
  # Camera & Image Processing
  camera: ^0.10.5+5
  image_picker: ^1.0.5
  
  # UI Components
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  
  # Charts & Visualization
  fl_chart: ^0.65.0
  
  # Payments
  in_app_purchase: ^3.1.11
  
  # OBD-II & Vehicle
  flutter_blue_plus: ^1.30.0
  
  # Routing
  go_router: ^13.0.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  path_provider: ^2.1.1
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # WebSocket for real-time
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
