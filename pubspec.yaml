name: mobility_super_app
description: Yeni Nesil Mobilite ve Yaşam Ekosistemi - Super App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Maps & Location
  mapbox_gl: ^0.16.0
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # IoT & Bluetooth
  flutter_blue_plus: ^1.31.0
  mqtt_client: ^10.2.0

  # Network & API
  dio: ^5.4.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.2

  # Payment & Finance
  flutter_stripe: ^10.1.1
  in_app_purchase: ^3.1.13

  # AI & ML
  tflite_flutter: ^0.10.4
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Audio & Voice
  speech_to_text: ^6.6.0
  text_to_speech: ^0.2.3
  flutter_tts: ^4.0.2
  audioplayers: ^5.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Firebase & Cloud
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  cloud_firestore: ^4.14.0

  # Analytics
  firebase_analytics: ^10.8.0
  mixpanel_flutter: ^2.2.0

  # Charts & Graphs
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.2.9

  # Permissions
  permission_handler: ^11.2.0

  # Device Info
  device_info_plus: ^9.1.1
  battery_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/ai_personas/

  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/custom_icons.ttf
