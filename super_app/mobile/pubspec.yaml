name: super_app_mobile
description: A new Flutter project for the Super App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.0
  google_maps_flutter: ^2.5.0 # Mapbox usually uses mapbox_gl, but using google maps as placeholder or if mapbox is desired, mapbox_gl
  # For Mapbox, we would use:
  # mapbox_maps_flutter: ^0.5.1 
  # But sticking to standard for now.
  # Adding mapbox specifically as requested
  mapbox_maps_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
